<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CERO GRADOS — Enlaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --magenta:#FE018F;
    --yellow:#FFCC00;
    --navy:#290D62;
    --cream:#FFF8EC;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,204,0,0.35), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(254,1,143,0.25), transparent 45%),
      var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--navy);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:48px 20px 32px;
  }
  .avatar{
    width:104px; height:104px;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 8px 0 var(--yellow), 0 8px 20px rgba(41,13,98,0.25);
    margin-bottom:18px;
  }
  .avatar img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  h1{
    font-family:'Fredoka', sans-serif;
    font-size:26px;
    letter-spacing:0.5px;
    color:var(--navy);
  }
  p.tag{
    font-weight:700;
    color:var(--magenta);
    margin-top:4px;
    margin-bottom:36px;
    font-size:14px;
    letter-spacing:1.5px;
    text-transform:uppercase;
  }
  .links{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    background:white;
    border:2.5px solid var(--navy);
    border-radius:16px;
    padding:16px 20px;
    text-decoration:none;
    color:var(--navy);
    font-weight:700;
    font-family:'Fredoka', sans-serif;
    font-size:16px;
    box-shadow:0 4px 0 var(--navy);
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  .link-btn:active{
    transform:translateY(4px);
    box-shadow:0 0 0 var(--navy);
  }
  .link-btn .icon{
    width:38px; height:38px;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
    flex-shrink:0;
  }
  .link-btn.web{ }
  .link-btn.web .icon{ background:var(--yellow); }
  .link-btn.web:hover{ background:var(--yellow); }

  .link-btn.club .icon{ background:var(--magenta); color:white; }
  .link-btn.club:hover{ background:var(--magenta); color:white; }
  .link-btn.club:hover .icon{ background:white; color:var(--magenta); }

  .link-btn.loc .icon{ background:var(--navy); color:white; }
  .link-btn.loc:hover{ background:var(--navy); color:white; }
  .link-btn.loc:hover .icon{ background:white; color:var(--navy); }

  .link-btn.ig .icon{ background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4); color:white; }
  .link-btn.ig:hover{ background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4); color:white; }
  .link-btn.ig:hover .icon{ background:white; color:#DD2A7B; }

  footer{
    margin-top:44px;
    font-size:12px;
    color:var(--navy);
    opacity:0.55;
    font-weight:600;
  }
</style>
</head>
